name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel in-flight runs for the same branch on new pushes
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Lint
        run: yarn lint

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Format check
        run: yarn format:check

      - name: Expo Doctor
        run: npx expo-doctor
        env:
          EXPO_NO_TELEMETRY: 1
